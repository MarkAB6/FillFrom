name: Build Windows x86 Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Öķïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive # ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― 3rdparty ïŋ―ïŋ―ïŋ―ïŋ―ÄĢïŋ―ïŋ―

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'      # ïŋ―ïŋ―ïŋ―ïŋ―Ęđïŋ―ïŋ― 5.15.2ïŋ―ïŋ―ïŋ―ïŋ―ÎŠïŋ―ïŋ―Ô­ïŋ―ïŋ―Ö§ïŋ―ïŋ― x86
        arch: 'win32_msvc2019' # Öļïŋ―ïŋ― 32 Îŧïŋ―Üđïŋ―
        # ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― Qt 6ïŋ―ïŋ―ïŋ―ïŋ―ŨĒïŋ―ïŋ―Ų·ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ãŧïŋ―áđĐ x86 ÔĪïŋ―ïŋ―ïŋ―ïŋ―ïŋ―

    - name: Set up MSVC (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Build Solution
      run: |
       
        msbuild FillFrom.sln /p:Configuration=Release /p:Platform=x86 /m

    - name: Prepare Deployment (windeployqt)
      run: |
     
        mkdir deploy
        copy x86\Release\*.exe deploy\
        windeployqt --release --no-translations --compiler-runtime deploy\FillFrom.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FillFrom_Windows_x86
        path: deploy/